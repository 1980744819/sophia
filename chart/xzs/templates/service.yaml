# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "xzs.fullname" . }}-frontend
  labels:
    {{- include "xzs.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if eq .Values.frontend.service.type "NodePort" }}
      nodePort: {{ .Values.frontend.service.nodePort }}
      {{- end }}
  selector:
    {{- include "xzs.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "xzs.fullname" . }}-backend
  labels:
    {{- include "xzs.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "xzs.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
